<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedo Offline</title>
    <link rel="manifest" href='data:application/json,{"name":"Speedo","short_name":"Speedo","start_url":".","display":"standalone","background_color":"#0f172a","theme_color":"#38bdf8","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3754/3754433.png","sizes":"512x512","type":"image/png"}]}'>
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f8fafc; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        #speed { font-size: 10rem; font-weight: 800; color: var(--accent); margin: 0; }
        .unit { font-size: 1.5rem; opacity: 0.7; letter-spacing: 2px; }
        .info-box {
            background: rgba(255,255,255,0.05); padding: 15px 30px;
            border-radius: 12px; margin-top: 20px; text-align: center;
        }
        #status { font-size: 0.8rem; margin-top: 10px; transition: color 0.3s; }
        .online { color: #22c55e; }
        .offline { color: #f59e0b; }
        button {
            background: var(--accent); border: none; padding: 15px 30px;
            border-radius: 30px; font-weight: bold; cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button onclick="init()">DÉMARRER LE COMPTEUR</button>
    </div>

    <div id="app" class="hidden">
        <div id="speed">0</div>
        <div class="unit">KM/H</div>
        <div class="info-box">
            <div style="font-size: 0.7rem; opacity: 0.6;">PRÉCISION GPS</div>
            <div id="acc">--</div>
        </div>
        <div id="status">Vérification connexion...</div>
    </div>

    <script>
        // 1. GESTION DU MODE HORS-LIGNE (SERVICE WORKER "AUTO-GÉNÉRÉ")
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'speedo-v1';
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['./'])));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'text/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // 2. DÉTECTION DE LA CONNEXION
        function updateOnlineStatus() {
            const status = document.getElementById('status');
            if (navigator.onLine) {
                status.innerText = "● Mode Connecté";
                status.className = "online";
            } else {
                status.innerText = "● Mode Hors-ligne (GPS actif)";
                status.className = "offline";
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // 3. LOGIQUE DU COMPTEUR
        function init() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            updateOnlineStatus();

            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        const s = pos.coords.speed;
                        const a = pos.coords.accuracy;
                        
                        // Conversion m/s en km/h
                        document.getElementById('speed').innerText = (s && s > 0.5) ? Math.round(s * 3.6) : 0;
                        document.getElementById('acc').innerText = `± ${Math.round(a)} m`;
                        document.getElementById('acc').style.color = a < 15 ? '#22c55e' : '#ef4444';
                    },
                    (err) => alert("Erreur GPS : " + err.message),
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
            }
        }
    </script>
</body>
</html>
